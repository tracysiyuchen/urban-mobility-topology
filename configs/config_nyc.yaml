data:
  dataset: "nyc_taxi"
  raw_path: "data/nyc-taxi-trip-duration/train.csv"
  processed_dir: "data/processed/nyc"
  h3_resolution: 8
  active_cell_min_trips: 20      # min total trips (pickup OR dropoff) to keep a cell
  trip_duration_min: 60           # seconds
  time_bins:
    Morning Peak: [6, 10]
    Midday: [10, 16]
    Evening Peak: [16, 20]
    Night_early: [20, 24]
    Night_late: [0, 6]
  geo_adj_top_k: 8                # top-k geographic neighbors per cell
  train_months: [1, 2, 3, 4]
  val_months: [5]
  test_months: [6]

trip2vec:
  embedding_dim: 64
  window: 1
  min_count: 1
  workers: 4
  epochs: 30
  sg: 1                           # skip-gram
  negative: 5


gcn:
  embedding_dim: 64
  hidden_dim: 128
  epochs: 30
  lr: 0.001
  weight_decay: 0.00001
  scheduler_step: 10
  scheduler_gamma: 0.5

dual_graph:
  embedding_dim: 64
  hidden_dim: 128
  n_heads: 4                        # multi-head cross-attention heads
  dropout: 0.3
  epochs: 30
  lr: 0.001
  weight_decay: 0.00001
  scheduler_step: 10
  scheduler_gamma: 0.5
  flow_adj_top_k: 16                # top-k neighbors for flow adjacency per snapshot

loss:
  zero_pair_sample_ratio: 1.0     # ratio of zero-pairs sampled relative to non-zero pairs

analysis:
  kmeans_k_range: [3, 4, 5, 6, 7, 8, 10]
  tsne_perplexity: 30
  random_seed: 42
