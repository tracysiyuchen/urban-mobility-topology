analysis:
  kmeans_k_range:
  - 5
  random_seed: 42
  tsne_perplexity: 30
data:
  active_cell_min_trips: 20
  dataset: porto
  geo_adj_top_k: 8
  h3_resolution: 8
  processed_dir: data/processed/porto
  raw_path: data/porto-trajectory/porto_trajectories_all.csv
  test_months:
  - 12
  time_bins:
    Evening Peak:
    - 16
    - 20
    Midday:
    - 10
    - 16
    Morning Peak:
    - 6
    - 10
    Night_early:
    - 20
    - 24
    Night_late:
    - 0
    - 6
  train_months:
  - 7
  - 8
  - 9
  - 10
  trip_duration_min: 60
  val_months:
  - 11
dual_graph:
  dropout: 0.3
  embedding_dim: 64
  epochs: 30
  flow_adj_top_k: 16
  hidden_dim: 128
  lr: 0.001
  n_heads: 4
  scheduler_gamma: 0.5
  scheduler_step: 10
  weight_decay: 1.0e-05
gcn:
  embedding_dim: 64
  epochs: 30
  hidden_dim: 128
  lr: 0.001
  scheduler_gamma: 0.5
  scheduler_step: 10
  weight_decay: 1.0e-05
loss:
  zero_pair_sample_ratio: 1.0
trip2vec:
  embedding_dim: 64
  epochs: 30
  min_count: 1
  negative: 5
  sg: 1
  window: 1
  workers: 4
